name = "pj-rust-workspace"
version = "0.3.3"

# Workspace-layer extras layered on top of pj-rust. Compose with
# pj-base + pj-rust; do NOT also apply pj-rust-cli on a workspace
# root — its release.yml.template hard-codes a single-binary shape
# (`BIN_NAME: ${{ github.event.repository.name }}`) that conflicts
# with a multi-bin workspace layout. Apply pj-rust-cli per-member
# under `crates/<name>/` if any leaf crate ships standalone.
#
# This layer brings:
#   * A Cargo.toml workspace skeleton — resolver=2, empty members[],
#     shared [workspace.package] / [workspace.dependencies], and
#     [profile.dev] debug = "line-tables-only" for the Windows PDB
#     LIMIT (LNK1318) workaround.
#   * A Makefile.toml [config] fragment turning off cargo-make's
#     workspace recursion. Our cargo invocations already use
#     --workspace / --all-targets, so per-member recursion just
#     duplicates work.
#   * A workspace-flavoured release.yml that cross-builds every
#     [[bin]] in the workspace, attaches them all to a single
#     GitHub Release (with auto-generated notes), and runs
#     `cargo publish` against every member whose `publish` field
#     allows crates.io — in topological dependency order, so a
#     member that depends on another finds its dep on the registry
#     already. Project-specific bits (bin names, publishable
#     members, inter-crate dep order) are discovered from
#     `cargo metadata` at run time — no per-PJ rendering needed.

[[file]]
src = "Cargo.toml.tera"
dst = "Cargo.toml"
how = "overwrite"
when = "once"

[[file]]
src = "Makefile.toml.fragment"
dst = "Makefile.toml"
how = "merge-toml"
when = "always"
paths = ["config"]

# Tag-driven release pipeline. `.template` suffix keeps GitHub
# Actions from auto-running the source inside this repo.
#
# `when = "always"` (not `"once"`): the template owns this file
# end-to-end so upstream improvements (a new action version, a
# fix in the topo-sort jq, a tweak to the staging block) flow
# into every consumer on the next `kata apply`. Mirrors what
# `Makefile.toml`'s `[config]` block does, just for the whole
# workflow file instead of a section.
#
# Side effect: consumers can't hand-edit `release.yml` and expect
# the edit to survive a kata apply. Custom release-time steps
# (notify slack, sign binaries, generate SBOM, …) belong in a
# **separate sibling workflow** at `.github/workflows/release-
# extras.yml` (or any name that isn't `release.yml`) — that file
# isn't kata-managed, and GHA fires every workflow whose `on:`
# matches the tag push, so the SRP-clean two-file shape behaves
# identically to a merged single file at run time.
[[file]]
src = ".github/workflows/release.yml.template"
dst = ".github/workflows/release.yml"
how = "overwrite"
when = "always"
